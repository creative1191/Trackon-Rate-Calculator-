name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow pyinstaller

      - name: Check Logo File
        run: |
          if (Test-Path "trackon_logo.png") {
            echo "Logo file found."
          } else {
            echo "Error: Logo file not found!"
            exit 1
          }

      - name: Convert Logo to ICO
        run: |
          # Convert PNG to ICO using Python script inline
          python -c "from PIL import Image; img = Image.open('trackon_logo.png'); img.save('trackon_logo.ico', format='ICO')"

      - name: Verify ICO File
        run: |
          if (Test-Path "trackon_logo.ico") {
            echo "ICO file created successfully."
          } else {
            echo "Error: Failed to create ICO file."
            exit 1
          }

      - name: Build EXE with PyInstaller
        run: |
          # Use the generated ICO file for the application icon
          pyinstaller --onefile --windowed --icon="trackon_logo.ico" --add-data "trackon_logo.png;." --name "Trackon_Calculator" trackon_calc_pro.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trackon_Calculator
          path: dist/Trackon_Calculator.exe
