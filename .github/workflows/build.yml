name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow pyinstaller

      - name: Generate Icon (icon.ico)
        run: |
          python -c "
          from PIL import Image
          import os
          try:
              # Priority 1: Use icon_source.png if it exists
              if os.path.exists('icon_source.png'):
                  img = Image.open('icon_source.png')
                  img.save('icon.ico')
                  print('Created icon.ico from icon_source.png')
              # Priority 2: Crop center from main logo
              elif os.path.exists('trackon_logo.png'):
                  img = Image.open('trackon_logo.png')
                  w, h = img.size
                  side = min(w, h)
                  left = (w - side) // 2
                  top = (h - side) // 2
                  crop = img.crop((left, top, left + side, top + side))
                  crop = crop.resize((256, 256), Image.Resampling.LANCZOS)
                  crop.save('icon.ico')
                  print('Created icon.ico from trackon_logo.png')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: Build EXE
        run: |
          # --add-data ensures icon.ico is available inside the running app
          pyinstaller --onefile --windowed --icon="icon.ico" --add-data "trackon_logo.png;." --add-data "icon.ico;." --name "Trackon_Calculator" trackon_calc_pro.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trackon_Calculator
          path: dist/Trackon_Calculator.exe
