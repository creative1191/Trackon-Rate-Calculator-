name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow pyinstaller

      - name: Convert Logo to ICO
        run: |
          # Ye command trackon_logo.png ko .ico format mein convert karegi
          python -c "from PIL import Image; img = Image.open('trackon_logo.png'); img.save('trackon_logo.ico')"

      - name: Build EXE with PyInstaller
        run: |
          # --icon=trackon_logo.ico se app ka icon change ho jayega
          pyinstaller --onefile --windowed --icon=trackon_logo.ico --name "Trackon_Calculator" --add-data "trackon_logo.png;." trackon_calc_pro.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trackon_Calculator
          path: dist/Trackon_Calculator.exe
