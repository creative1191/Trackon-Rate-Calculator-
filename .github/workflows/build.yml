name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow pyinstaller

      - name: Generate Perfect Icon
        run: |
          # Logic: Agar icon_source.png hai toh wo use karo, nahi toh logo crop karo
          python -c "
          from PIL import Image
          import os
          try:
              if os.path.exists('icon_source.png'):
                  print('Found square icon_source.png! Using it.')
                  img = Image.open('icon_source.png')
                  img.save('icon.ico')
              else:
                  print('No square icon found. Cropping main logo center...')
                  img = Image.open('trackon_logo.png')
                  w, h = img.size
                  side = min(w, h)
                  left = (w - side) // 2
                  top = (h - side) // 2
                  icon_img = img.crop((left, top, left + side, top + side))
                  icon_img = icon_img.resize((256, 256), Image.Resampling.LANCZOS)
                  icon_img.save('icon.ico')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon="icon.ico" --add-data "trackon_logo.png;." --name "Trackon_Calculator" trackon_calc_pro.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trackon_Calculator
          path: dist/Trackon_Calculator.exe
