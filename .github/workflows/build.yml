name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          # --add-data bundles the logo inside the exe so it works standalone
          pyinstaller --onefile --windowed --name "Trackon_Calculator" --add-data "trackon_logo.png;." trackon_calc_pro.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trackon_Calculator
          path: dist/Trackon_Calculator.exe
